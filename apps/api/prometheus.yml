global:
  scrape_interval: 15s
  evaluation_interval: 15s

storage:
  tsdb:
    retention:
      time: 30d

scrape_configs:
  - job_name: source-taster-api
    static_configs:
      - targets:
          - 'api:8000'

  - job_name: cadvisor
    static_configs:
      - targets:
          - 'cadvisor:8080'
