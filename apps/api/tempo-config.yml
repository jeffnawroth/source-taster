stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

live_store:
  max_trace_idle: 10s
  max_block_duration: 5m

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 6h
        compacted_block_retention: 10m

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

overrides:
  defaults:
    compaction:
      block_retention: 6h
